/* ═══ GROUP BY PREFIX ═══ */
function groupProcs(procs){

  const sorted=[...procs].sort((a,b)=>a.name.localeCompare(b.name));
  sorted.forEach(proc=>{const di=proc.name.indexOf(' - ');const origIdx=procs.indexOf(proc);if(di>0){const prefix=proc.name.substring(0,di).trim();const sub=proc.name.substring(di+3).trim();if(!groups[prefix])groups[prefix]=[];groups[prefix].push({proc,subName:sub,oi:origIdx});}else standalone.push({proc,oi:origIdx});});

  allKeys.forEach(key=>{if(used.has(key))return;used.add(key);if(groups[key])result.push({type:"group",name:key,items:groups[key]});else{const s=standalone.find(p=>p.proc.name===key);if(s)result.push({type:"proc",proc:s.proc,oi:s.oi});}});
  return result;
}

function App(){
